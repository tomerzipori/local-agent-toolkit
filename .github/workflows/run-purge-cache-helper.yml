name: Run purge cache helper

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/purge-cache-on-uninstall'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Run embedded implementation script
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          text = Path('.github/workflows/apply-purge-cache-change.yml').read_text(encoding='utf-8')
          start = text.index("        run: |\n", text.index("- name: Apply implementation"))
          start += len("        run: |\n")
          end = text.index("\n      - name: Remove helper workflow", start)
          lines = text[start:end].splitlines()
          script = "\n".join(line[10:] if line.startswith("          ") else line for line in lines)
          Path('/tmp/apply-purge-cache.sh').write_text(script + "\n", encoding='utf-8')
          PY
          bash /tmp/apply-purge-cache.sh

      - name: Remove helper workflows
        run: rm .github/workflows/apply-purge-cache-change.yml .github/workflows/run-purge-cache-helper.yml

      - name: Run focused tests
        run: |
          python3 -m unittest tests.test_installer -v
          bash scripts/installer-smoke.sh
          bash -n install.sh

      - name: Commit implementation
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "purge local-agent cache with config"
          git push origin HEAD:${{ github.head_ref }}
